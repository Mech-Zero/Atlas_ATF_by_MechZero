[mod-setting-name]
ATF-dmg-upgrade=Улучшение урона оружия ATF
ATF-rof-upgrade=Улучшение скорострельности оружия ATF
[mod-setting-description]
ATF-dmg-upgrade=Включите это, чтобы оружие ATF получало улучшение урона от исследований. (по умолчанию включено)
ATF-rof-upgrade=Включите это, чтобы оружие ATF получало улучшение скорострельности от исследований. (по умолчанию выключено)
[mod-name]
Atlas_ATF=ATFELPN
[mod-description]
Atlas_ATF=Алкоголь, Табак, Огнестрельное оружие, Взрывчатка, Лазеры, Плазма и Ядерное оружие! Производите широкий ассортимент этих предметов для самообороны, развлекательных или коммерческих целей. Рекомендуются более сильные враги.
