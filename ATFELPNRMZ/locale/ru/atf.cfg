mercury=Высокотоксично. Используется для изготовления капсюлей.
cinnabar-ore=Киноварная руда, может быть переплавлена в ртуть.
ATF-gunbox-ammo=[Товар] Большая коробка патронов, похоже, никогда не остаётся без покупателей.
ATF-gunbox-old=[Товар] Ящик старых пушек. Коллекционеры будут в восторге.
ATF-gunbox-coldwar=[Товар] Ящик оружия эпохи Холодной войны. Эй, пока они стреляют, они убивают.
ATF-gunbox-modern=[Товар] Ящик современного оружия, в идеальном состоянии и готов убивать.
ATF-gunbox-heavy=[Товар] Ящик тяжёлого оружия. Тот, кто покупает это, действительно хочет, чтобы его враги были мертвее мёртвого.
ATF-gunbox-concept=[Товар] Ящик концепт-оружия. Люди действительно копают этот технический бред.
ATF-rcxd=Дистанционно управляемая машинка с взрывчаткой, способная находить врагов и наносить сокрушительный урон в самоубийственной атаке.
ATF-rcnd=Дистанционно управляемая машинка с ядерными устройствами, способная находить врагов и инициировать ядерный взрыв при уничтожении.
ATF-swatt-turret=Турель Swatt. В основном наносит электрический урон.
ATF-m25-turret=Когда фазовая плазменная винтовка мощностью 40 ватт на треноге...
ATF-grenade-turret=Гранатомётная турель. Стреляет гранатами по врагам со смертоносной точностью.
ATF-grenade-turret-2=Гранатомётная турель mk2 стреляет быстрее и имеет лучшую дальность.
ATF-gau-turret=Турель GAU. Огневая мощь штурмовика в вашем стационарном распоряжении.
ATF-rcw-turret=Турель RCW, стреляющая лазером с высокой скорострельностью.
ATF-tesla-turret=Ранний прототип турели Tesla. Жарит врагов вблизи.
ATF-tesla-turret-2=Улучшенная турель Tesla. Наносит больше урона и имеет большую дальность.
ATF-cash=Корень всего зла.
ATF-gold=Несколько слитков чистого золота. Довольно ценно.
ATF-gems=Пригоршня красочных и ценных камней.
ATF-gembox=Позолоченная коробка с драгоценными камнями. Может принести высокую цену.
