[technology-description]
assault-rifle-tech=Штурмовые винтовки обеспечивают лучшую огневую мощь, чем стандартные ПП.
poly-acc-tech=Полимерные части оружия позволяют ещё больше снизить вес оружия.
smg-tech=Пистолеты-пулемёты обычно имеют отличную скорострельность.
lmg-tech=Ручные пулемёты отлично подходят для подавления врагов.
semi-tech=Полуавтоматическое оружие имеет лучшую скорострельность, чем болтовое.
modern-tech=Современное оружие для современной войны.
bolt-tech=Болтовые винтовки обеспечивают хорошую надёжность, дальность и точность.
mg-tech=Пулемёты обеспечивают превосходную огневую мощь и позволяют подавлять область.
drum-tech=Барабанные магазины неуклюжи и ненадёжны. Но никто не может отрицать, что они выглядят awesome. В игре барабанные магазины обеспечивают дополнительные эффекты урона и ёмкость патронов.
drum-tech2=Современные барабанные магазины немного более надёжны. Также обеспечивают аналогичные преимущества, как старые барабаны.
coldwar-tech=Оружие эпохи Холодной войны является предшественником многих современных оружий.
concept-tech=Концепт-оружие экспериментальное и обладает превосходным управлением и уроном.
concept-tech2=Они просто не имеют смысла, не так ли?
hmg-tech=Тяжёлые пулемёты могут вывести вашу огневую мощь на следующий уровень.
rotator-tech=Ultimate решение для наземной боевой огневой мощи. Осторожно: низкая мобильность. Рекомендуются экзоскелеты.
rotator-tech2=Принесите смерть и разрушение в граде высококалиберных пушечных пуль.
gl-tech=Стреляйте взрывчатыми боеприпасами на большое расстояние с помощью гранатомёта.
gl-tech2=Улучшенные модели гранатомётов обеспечивают ещё лучшую огневую мощь.
gl-tech3=Из будущего, со взрывчаткой. Взрывайте.
chemwar-tech=Разрабатывайте химическое оружие массового уничтожения, потому что к чёрту Природу. В конце концов, что Природа когда-либо сделала для вас?
shotgun-tech=Когда вам нужно спуститься и испачкаться, дробовик — ваш лучший выбор.
shotgun-tech2=Облейте врагов тяжёлым дождём дроби.
future-tech=Будущее уже здесь! Вперёд к геноцидам!
rcxd-tech=Дистанционно управляемые взрывчатки, способные нанести серьёзный взрывной урон.
rcxd-tech2=Дистанционно управляемые ядерные устройства, способные уничтожить врагов в большом радиусе.
advanced-pa-tech=Большие и лучшие наборы силовой брони.
advanced-pa-tech-2=Ultimate боевой костюм, делающий вас почти непобедимым.
ATF-trade=Продавайте предметы, чтобы зарабатывать деньги, и покупайте вещи за деньги.
